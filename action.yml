name: Verify Solutions
description: Macro alias for verifying selected ArchAgents Solutions.

inputs:
  solution-roots:
    description: Comma-separated directories containing solution subdirectories.
    required: false
    default: solutions
  solution:
    description: all, one solution slug, or comma-separated solution slugs.
    required: false
    default: all
  skip-sample-solutions:
    description: Skip solution.yaml files whose category_keys include sample.
    required: false
    default: "false"
  output-dir:
    description: Directory for packaged tarballs. Empty uses $RUNNER_TEMP/archastro-solution-dist.
    required: false
    default: ""
  owner:
    description: Owner scope. Use org for archagent or system for archastro.
    required: false
    default: org

runs:
  using: composite
  steps:
    - name: Install Python dependencies
      shell: bash
      run: python3 -m pip install pyyaml==6.0.2

    - name: Install archagent CLI
      shell: bash
      env:
        ARCHAGENT_INSTALL_DIR: ${{ runner.temp }}/bin
        ARCHAGENT_INSTALL_SKIP_COMPLETIONS: "true"
        ARCHAGENT_INSTALL_SKIP_PATH_UPDATE: "true"
        ARCHAGENT_RELEASE_BASE_URL: https://github.com/ArchAstro/archagents/releases/latest/download
      run: |
        curl -fsSL https://raw.githubusercontent.com/ArchAstro/archagents/main/install.sh | bash

    - name: Install archastro CLI
      shell: bash
      env:
        ARCHASTRO_INSTALL_DIR: ${{ runner.temp }}/bin
        ARCHASTRO_INSTALL_SKIP_COMPLETIONS: "true"
        ARCHASTRO_INSTALL_SKIP_PATH_UPDATE: "true"
        ARCHASTRO_RELEASE_BASE_URL: https://github.com/ArchAstro/archastro/releases/latest/download
      run: |
        curl -fsSL https://raw.githubusercontent.com/ArchAstro/archastro/main/install.sh | bash
        echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

    - name: Validate, lint, and package solutions
      shell: bash
      env:
        SOLUTION_ROOTS: ${{ inputs.solution-roots }}
        SOLUTION: ${{ inputs.solution }}
        SKIP_SAMPLE_SOLUTIONS: ${{ inputs.skip-sample-solutions }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        OWNER: ${{ inputs.owner }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/scripts/solution_ci/cli_mode.sh"
        cli="$(archastro_cli_for_owner "$OWNER")"
        filter_args=(
          --repo-root "$GITHUB_WORKSPACE"
          --solution-roots "$SOLUTION_ROOTS"
          --solution "$SOLUTION"
        )
        if [[ "$SKIP_SAMPLE_SOLUTIONS" == "true" ]]; then
          filter_args+=(--skip-sample-solutions)
        fi
        output_dir="$OUTPUT_DIR"
        if [[ -z "$output_dir" ]]; then
          output_dir="$RUNNER_TEMP/archastro-solution-dist"
        fi
        mkdir -p "$output_dir"
        while IFS= read -r dir; do
          echo "::group::$dir"
          "$cli" validate solution "$dir" --schema-only
          "$cli" lint solution "$dir" --strict
          "$cli" package solution "$dir" --output-dir "$output_dir"
          echo "::endgroup::"
        done < <(python3 "$GITHUB_ACTION_PATH/scripts/solution_ci/discover_solutions.py" "${filter_args[@]}")
