name: Configure ArchAgent
description: Configure archagent with an ArchAstro system user token.

inputs:
  archastro-system-user-token:
    description: ArchAstro system user token.
    required: true

runs:
  using: composite
  steps:
    - name: Configure archagent credentials
      shell: bash
      env:
        ARCHASTRO_SYSTEM_USER_TOKEN: ${{ inputs.archastro-system-user-token }}
      run: |
        set -euo pipefail
        : "${ARCHASTRO_SYSTEM_USER_TOKEN:?archastro-system-user-token is required}"
        echo "::add-mask::$ARCHASTRO_SYSTEM_USER_TOKEN"
        args=(--access-token "$ARCHASTRO_SYSTEM_USER_TOKEN")
        app_id="${ARCHASTRO_SYSTEM_USER_APP_ID:-}"
        app_name="${ARCHASTRO_SYSTEM_USER_APP_NAME:-}"
        if [[ -n "$app_id" ]]; then
          args+=(--app-id "$app_id")
        fi
        if [[ -n "$app_name" ]]; then
          args+=(--app-name "$app_name")
        fi
        archagent auth set-credentials "${args[@]}"
