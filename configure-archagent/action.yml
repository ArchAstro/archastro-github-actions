name: Configure ArchAgent
description: Configure archagent with an ArchAstro system user token.

inputs:
  archastro-system-user-token:
    description: ArchAstro system user token.
    required: true
  owner:
    description: Owner scope. Use org for archagent or system for archastro.
    required: false
    default: org

runs:
  using: composite
  steps:
    - name: Configure ArchAstro credentials
      shell: bash
      env:
        ARCHASTRO_SYSTEM_USER_TOKEN: ${{ inputs.archastro-system-user-token }}
        OWNER: ${{ inputs.owner }}
      run: |
        set -euo pipefail
        : "${ARCHASTRO_SYSTEM_USER_TOKEN:?archastro-system-user-token is required}"
        echo "::add-mask::$ARCHASTRO_SYSTEM_USER_TOKEN"
        source "$GITHUB_ACTION_PATH/../scripts/solution_ci/cli_mode.sh"
        cli="$(archastro_cli_for_owner "$OWNER")"
        "$cli" auth systemuser --token "$ARCHASTRO_SYSTEM_USER_TOKEN"
