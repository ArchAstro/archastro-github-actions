name: Release And Deploy Solutions
description: Macro action that installs archagent, releases selected solutions, then deploys their released tarballs.

inputs:
  solution-roots:
    description: Comma-separated directories containing solution subdirectories.
    required: false
    default: solutions
  solution:
    description: all, one solution slug, or comma-separated solution slugs.
    required: false
    default: all
  skip-sample-solutions:
    description: Skip solution.yaml files whose category_keys include sample.
    required: false
    default: "false"
  archastro-system-user-token:
    description: ArchAstro system user token.
    required: true
  github-token:
    description: GitHub token for gh release commands.
    required: true
  owner:
    description: Deployment owner scope. Use org for archagent or system for archastro.
    required: false
    default: org
  dry-run:
    description: Preview deployment changes instead of applying them.
    required: false
    default: "true"
  allow-downgrade:
    description: Allow solution downgrades during deploy.
    required: false
    default: "false"
  download-dir:
    description: Directory for downloaded release tarballs.
    required: false
    default: .released-solutions

runs:
  using: composite
  steps:
    - name: Install Python dependencies
      shell: bash
      run: python3 -m pip install pyyaml==6.0.2

    - name: Install archagent CLI
      shell: bash
      env:
        ARCHAGENT_INSTALL_DIR: ${{ runner.temp }}/bin
        ARCHAGENT_INSTALL_SKIP_COMPLETIONS: "true"
        ARCHAGENT_INSTALL_SKIP_PATH_UPDATE: "true"
        ARCHAGENT_RELEASE_BASE_URL: https://github.com/ArchAstro/archagents/releases/latest/download
      run: |
        curl -fsSL https://raw.githubusercontent.com/ArchAstro/archagents/main/install.sh | bash

    - name: Install archastro CLI
      shell: bash
      env:
        ARCHASTRO_INSTALL_DIR: ${{ runner.temp }}/bin
        ARCHASTRO_INSTALL_SKIP_COMPLETIONS: "true"
        ARCHASTRO_INSTALL_SKIP_PATH_UPDATE: "true"
        ARCHASTRO_RELEASE_BASE_URL: https://github.com/ArchAstro/archastro/releases/latest/download
      run: |
        curl -fsSL https://raw.githubusercontent.com/ArchAstro/archastro/main/install.sh | bash
        echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

    - name: Configure archastro system user
      shell: bash
      env:
        ARCHASTRO_SYSTEM_USER_TOKEN: ${{ inputs.archastro-system-user-token }}
        OWNER: ${{ inputs.owner }}
      run: |
        set -euo pipefail
        : "${ARCHASTRO_SYSTEM_USER_TOKEN:?archastro-system-user-token is required}"
        echo "::add-mask::$ARCHASTRO_SYSTEM_USER_TOKEN"
        source "$GITHUB_ACTION_PATH/../scripts/solution_ci/cli_mode.sh"
        cli="$(archastro_cli_for_owner "$OWNER")"
        "$cli" auth systemuser --token "$ARCHASTRO_SYSTEM_USER_TOKEN"

    - name: Release and deploy solutions
      shell: bash
      env:
        SOLUTION_ROOTS: ${{ inputs.solution-roots }}
        SOLUTION: ${{ inputs.solution }}
        SKIP_SAMPLE_SOLUTIONS: ${{ inputs.skip-sample-solutions }}
        GH_TOKEN: ${{ inputs.github-token }}
        DRY_RUN: ${{ inputs.dry-run }}
        ALLOW_DOWNGRADE: ${{ inputs.allow-downgrade }}
        DOWNLOAD_DIR: ${{ inputs.download-dir }}
        OWNER: ${{ inputs.owner }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../scripts/solution_ci/cli_mode.sh"
        cli="$(archastro_cli_for_owner "$OWNER")"
        base_args=(
          --repo-root "$GITHUB_WORKSPACE"
          --solution-roots "$SOLUTION_ROOTS"
          --solution "$SOLUTION"
        )
        if [[ "$SKIP_SAMPLE_SOLUTIONS" == "true" ]]; then
          base_args+=(--skip-sample-solutions)
        fi
        python3 "$GITHUB_ACTION_PATH/../scripts/solution_ci/release_solutions.py" "${base_args[@]}" --cli "$cli"
        deploy_args=("${base_args[@]}" --download-dir "$DOWNLOAD_DIR" --cli "$cli" --owner "$OWNER")
        if [[ "$DRY_RUN" == "true" ]]; then
          deploy_args+=(--dry-run)
        fi
        if [[ "$ALLOW_DOWNGRADE" == "true" ]]; then
          deploy_args+=(--allow-downgrade)
        fi
        python3 "$GITHUB_ACTION_PATH/../scripts/solution_ci/deploy_released_solutions.py" "${deploy_args[@]}"
